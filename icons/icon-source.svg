<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07001a"/>
      <stop offset="50%" stop-color="#1a0050"/>
      <stop offset="100%" stop-color="#0f0030"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d78"/>
      <stop offset="50%" stop-color="#9b30ff"/>
      <stop offset="100%" stop-color="#00c8ff"/>
    </linearGradient>
    <radialGradient id="glowPink" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ff2d78" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff2d78" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="80%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="220" fill="url(#glowPink)"/>
  <rect width="1024" height="1024" rx="220" fill="url(#glowBlue)"/>

  <!-- subtle border -->
  <rect x="6" y="6" width="1012" height="1012" rx="216" fill="none" stroke="#9b30ff" stroke-opacity="0.35" stroke-width="3"/>

  <!-- big speech bubble -->
  <g filter="url(#glow)">
    <path d="M 220 280
             Q 220 180 320 180
             L 720 180
             Q 820 180 820 280
             L 820 580
             Q 820 680 720 680
             L 480 680
             L 380 800
             L 380 680
             L 320 680
             Q 220 680 220 580 Z"
          fill="url(#brand)" opacity="0.95"/>
  </g>

  <!-- big question mark inside bubble -->
  <text x="520" y="565"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="420"
        font-weight="900"
        text-anchor="middle"
        fill="#ffffff">?</text>

  <!-- accent dots representing other languages around bubble -->
  <circle cx="160" cy="160" r="22" fill="#ffcc00"/>
  <circle cx="880" cy="200" r="18" fill="#00ff88"/>
  <circle cx="900" cy="780" r="16" fill="#ff2d78"/>
  <circle cx="150" cy="820" r="20" fill="#00c8ff"/>
</svg>
